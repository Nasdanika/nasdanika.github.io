<svg width="20" height="20" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">EMF Ecore file icon</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A square icon representing an EMF Ecore model file, styled after Eclipse IDE file icons with a teal-blue color scheme, showing a document shape with a folded corner and the Ecore "E" monogram.</desc>

  <defs>
    <linearGradient id="docGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D8CCA"/>
      <stop offset="100%" stop-color="#1A5F96"/>
    </linearGradient>
    <linearGradient id="cornerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BB8F5"/>
      <stop offset="100%" stop-color="#2D8CCA"/>
    </linearGradient>
    <linearGradient id="foldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A5F96"/>
      <stop offset="100%" stop-color="#0D3A61"/>
    </linearGradient>
  </defs>

  <!-- Document body -->
  <path d="M120 80 L500 80 L560 140 L560 600 Q560 620 540 620 L120 620 Q100 620 100 600 L100 100 Q100 80 120 80 Z" fill="url(#docGrad)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Folded corner triangle (shadow) -->
  <path d="M500 80 L560 140 L500 140 Z" fill="url(#foldGrad)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Folded corner highlight -->
  <path d="M500 80 L500 140 L560 140" fill="none" stroke="#5BB8F5" stroke-width="2" opacity="0.6" style="fill:none;stroke:rgb(91, 184, 245);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Inner document highlight line -->
  <rect x="100" y="80" width="5" height="520" rx="2" fill="#5BB8F5" opacity="0.25" style="fill:rgb(91, 184, 245);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- "E" letterform - bold, geometric, centered -->
  <!-- Main vertical bar -->
  <rect x="200" y="240" width="54" height="210" rx="6" fill="white" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Top horizontal bar -->
  <rect x="200" y="240" width="210" height="52" rx="6" fill="white" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Middle horizontal bar -->
  <rect x="200" y="319" width="170" height="52" rx="6" fill="white" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Bottom horizontal bar -->
  <rect x="200" y="398" width="210" height="52" rx="6" fill="white" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Small "ecore" wordmark at bottom of icon -->
  <text x="330" y="560" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="700" fill="white" opacity="0.85" letter-spacing="3" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:sans-serif;font-size:38px;font-weight:700;text-anchor:middle;dominant-baseline:auto">ecore</text>

  <!-- Subtle border -->
  <path d="M120 80 L500 80 L560 140 L560 600 Q560 620 540 620 L120 620 Q100 620 100 600 L100 100 Q100 80 120 80 Z" fill="none" stroke="#1A5F96" stroke-width="3" style="fill:none;stroke:rgb(26, 95, 150);color:rgb(0, 0, 0);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>